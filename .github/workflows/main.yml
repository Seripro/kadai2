name: Scheduled deploy

on:
    push:
    workflow_dispatch:

jobs:
    build:
        name: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
            - name: Install dependencies
              run: npm install
            - name: Run build
              run: npm run build

    deploy:
        name: deploy
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup Node.js and cache
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install firebase-tools
              run: npm install --save-dev firebase-tools
            - name: Create Firebase service account key
              env:
                  FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
              run: |
                  echo "$FIREBASE_KEY" > ./firebase-key.json
                  echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-key.json" >> $GITHUB_ENV
            - name: List Firebase projects (Debug)
              run: ./node_modules/.bin/firebase projects:list
            - name: Deploy to Firebase Hosting
              run: |
                  ./node_modules/.bin/firebase deploy --project "${{ secrets.FIREBASE_PROJECT_ID }}"
              env:
                  FIREBASE_CLI_EXPERIMENTS: webframeworks
            - name: delete GOOGLE_APPLICATION_CREDENTIALS
              run: |
                  if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
                      rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
                  fi
              if: ${{ always() }}
